<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meeting Prep Coach</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background: #0f172a; }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STORAGE_KEY = "meeting-prep-sessions";
    const API_KEY_STORAGE = "meeting-prep-api-key";

    function loadSessions() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch { return []; }
    }

    function saveSessions(sessions) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions.slice(0, 5)));
    }

    function loadApiKey() {
      return localStorage.getItem(API_KEY_STORAGE) || "";
    }

    function saveApiKey(key) {
      localStorage.setItem(API_KEY_STORAGE, key);
    }

    // ---------- Settings Panel ----------
    function SettingsPanel({ apiKey, setApiKey, onClose }) {
      const [draft, setDraft] = useState(apiKey);
      return (
        <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4">
          <div className="bg-slate-800 rounded-2xl p-6 w-full max-w-md shadow-xl border border-slate-700">
            <h2 className="text-xl font-bold text-white mb-4">Settings</h2>
            <label className="block text-sm text-slate-300 mb-2">Anthropic API Key</label>
            <input
              type="password"
              value={draft}
              onChange={e => setDraft(e.target.value)}
              placeholder="sk-ant-..."
              className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 mb-4"
            />
            <p className="text-xs text-slate-400 mb-6">Your key is stored only in this browser's localStorage. It is sent directly to the Anthropic API and nowhere else.</p>
            <div className="flex gap-3 justify-end">
              <button onClick={onClose} className="px-4 py-2 rounded-lg text-slate-300 hover:bg-slate-700 transition">Cancel</button>
              <button
                onClick={() => { setApiKey(draft); saveApiKey(draft); onClose(); }}
                className="px-4 py-2 rounded-lg bg-indigo-600 text-white hover:bg-indigo-500 transition font-medium"
              >Save</button>
            </div>
          </div>
        </div>
      );
    }

    // ---------- Question Card ----------
    function QuestionCard({ index, question, context }) {
      return (
        <div className="fade-in bg-slate-800/80 border border-slate-700 rounded-xl p-5 hover:border-indigo-500/50 transition">
          <div className="flex items-start gap-3">
            <span className="flex-shrink-0 w-8 h-8 rounded-full bg-indigo-600 text-white flex items-center justify-center text-sm font-bold">{index}</span>
            <div>
              <p className="text-white text-base leading-relaxed font-medium">{question}</p>
              <p className="text-slate-400 text-sm mt-2 italic">{context}</p>
            </div>
          </div>
        </div>
      );
    }

    // ---------- History Sidebar ----------
    function HistorySidebar({ sessions, onSelect, onClose }) {
      return (
        <div className="fixed inset-0 bg-black/60 flex justify-end z-50">
          <div className="bg-slate-800 w-full max-w-md h-full overflow-y-auto p-6 border-l border-slate-700 shadow-xl">
            <div className="flex items-center justify-between mb-6">
              <h2 className="text-xl font-bold text-white">Previous Sessions</h2>
              <button onClick={onClose} className="text-slate-400 hover:text-white text-2xl leading-none">&times;</button>
            </div>
            {sessions.length === 0 ? (
              <p className="text-slate-400">No previous sessions yet.</p>
            ) : (
              <div className="space-y-3">
                {sessions.map((s, i) => (
                  <button
                    key={i}
                    onClick={() => { onSelect(s); onClose(); }}
                    className="w-full text-left bg-slate-900 border border-slate-700 rounded-xl p-4 hover:border-indigo-500/50 transition"
                  >
                    <p className="text-sm text-indigo-400 mb-1">{new Date(s.timestamp).toLocaleString()}</p>
                    {s.role && <p className="text-xs text-slate-400 mb-1">Role: {s.role}</p>}
                    <p className="text-slate-300 text-sm line-clamp-2">{s.input.slice(0, 120)}...</p>
                    <p className="text-xs text-slate-500 mt-1">{s.questions.length} questions</p>
                  </button>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ---------- Main App ----------
    function App() {
      const [apiKey, setApiKey] = useState(loadApiKey);
      const [showSettings, setShowSettings] = useState(false);
      const [showHistory, setShowHistory] = useState(false);
      const [input, setInput] = useState("");
      const [role, setRole] = useState("");
      const [questions, setQuestions] = useState([]);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState("");
      const [copied, setCopied] = useState(false);
      const [sessions, setSessions] = useState(loadSessions);

      async function analyse() {
        if (!apiKey) { setShowSettings(true); return; }
        if (!input.trim()) { setError("Please paste a meeting agenda or minutes."); return; }

        setError("");
        setLoading(true);
        setQuestions([]);

        const systemPrompt = "You are a seasoned agile delivery coach and consultant. Your job is to read a meeting agenda or meeting minutes and generate 5 to 6 sharp, open-ended coaching questions the user should consider asking or reflecting on. Focus on uncovering hidden risks, assumptions, blockers, or misalignments. Avoid generic questions. Make them specific to the content provided.\n\nRespond ONLY with valid JSON — no markdown, no code fences, no extra text. Use this exact format:\n[{\"question\":\"...\",\"context\":\"...\"}]";

        const userMsg = `${role ? `My role: ${role}\n\n` : ""}Here is the meeting content:\n\n${input}`;

        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-api-key": apiKey,
              "anthropic-version": "2023-06-01",
              "anthropic-dangerous-direct-browser-access": "true"
            },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1500,
              system: systemPrompt,
              messages: [{ role: "user", content: userMsg }]
            })
          });

          if (!res.ok) {
            const body = await res.json().catch(() => ({}));
            throw new Error(body.error?.message || `API error ${res.status}`);
          }

          const data = await res.json();
          const text = data.content?.[0]?.text || "";
          const parsed = JSON.parse(text);

          setQuestions(parsed);

          const session = { timestamp: Date.now(), input, role, questions: parsed };
          const updated = [session, ...sessions].slice(0, 5);
          setSessions(updated);
          saveSessions(updated);
        } catch (e) {
          setError(e.message || "Something went wrong.");
        } finally {
          setLoading(false);
        }
      }

      function copyAll() {
        const text = questions.map((q, i) => `${i + 1}. ${q.question}\n   Why it matters: ${q.context}`).join("\n\n");
        navigator.clipboard.writeText(text).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        });
      }

      function selectSession(s) {
        setInput(s.input);
        setRole(s.role || "");
        setQuestions(s.questions);
      }

      return (
        <div className="min-h-screen text-white">
          {showSettings && <SettingsPanel apiKey={apiKey} setApiKey={setApiKey} onClose={() => setShowSettings(false)} />}
          {showHistory && <HistorySidebar sessions={sessions} onSelect={selectSession} onClose={() => setShowHistory(false)} />}

          {/* Header */}
          <header className="border-b border-slate-800 bg-slate-900/80 backdrop-blur sticky top-0 z-40">
            <div className="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-9 h-9 rounded-lg bg-indigo-600 flex items-center justify-center text-lg font-bold">M</div>
                <h1 className="text-xl font-bold tracking-tight">Meeting Prep Coach</h1>
              </div>
              <div className="flex gap-2">
                <button onClick={() => setShowHistory(true)} className="px-3 py-2 rounded-lg text-sm text-slate-300 hover:bg-slate-800 transition" title="Previous sessions">
                  History{sessions.length > 0 && <span className="ml-1 text-xs bg-slate-700 px-1.5 py-0.5 rounded-full">{sessions.length}</span>}
                </button>
                <button onClick={() => setShowSettings(true)} className="px-3 py-2 rounded-lg text-sm text-slate-300 hover:bg-slate-800 transition">
                  {apiKey ? "API Key Set" : "Set API Key"}
                </button>
              </div>
            </div>
          </header>

          {/* Main */}
          <main className="max-w-4xl mx-auto px-4 py-8">
            <div className="mb-8">
              <p className="text-slate-400 text-sm mb-6">Paste a meeting agenda or minutes. Get sharp coaching questions to help you prepare.</p>

              <div className="flex gap-4 mb-4">
                <div className="flex-1">
                  <label className="block text-xs text-slate-400 mb-1.5 uppercase tracking-wider">Your Role (optional)</label>
                  <input
                    value={role}
                    onChange={e => setRole(e.target.value)}
                    placeholder="e.g. delivery lead, consultant, observer"
                    className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm"
                  />
                </div>
              </div>

              <label className="block text-xs text-slate-400 mb-1.5 uppercase tracking-wider">Meeting Agenda / Minutes</label>
              <textarea
                value={input}
                onChange={e => setInput(e.target.value)}
                rows={10}
                placeholder="Paste your meeting agenda or minutes here..."
                className="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm leading-relaxed resize-y"
              />

              <div className="flex items-center gap-4 mt-4">
                <button
                  onClick={analyse}
                  disabled={loading}
                  className="px-6 py-2.5 rounded-xl bg-indigo-600 text-white font-medium hover:bg-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed transition flex items-center gap-2"
                >
                  {loading ? (
                    <>
                      <svg className="animate-spin h-4 w-4" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" fill="none" /><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" /></svg>
                      Analysing...
                    </>
                  ) : "Analyse"}
                </button>
                {error && <p className="text-red-400 text-sm">{error}</p>}
              </div>
            </div>

            {/* Results */}
            {questions.length > 0 && (
              <div>
                <div className="flex items-center justify-between mb-4">
                  <h2 className="text-lg font-semibold">Coaching Questions</h2>
                  <button
                    onClick={copyAll}
                    className="px-4 py-2 rounded-lg text-sm border border-slate-600 text-slate-300 hover:bg-slate-800 transition flex items-center gap-2"
                  >
                    {copied ? (
                      <><svg className="w-4 h-4 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg> Copied!</>
                    ) : (
                      <><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg> Copy All Questions</>
                    )}
                  </button>
                </div>
                <div className="space-y-3">
                  {questions.map((q, i) => (
                    <QuestionCard key={i} index={i + 1} question={q.question} context={q.context} />
                  ))}
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
